# Knowledge Graph Schema Definition
# Neo4j graph database schema for quants knowledge management
#
# Usage:
#   - This file defines the canonical graph schema (SSoT)
#   - mcp-neo4j-data-modeling can import/export compatible models
#   - Schema changes should be made here first, then applied to Neo4j
#
# Changelog:
#   v1.0 (2026-03-17): Initial schema for quants project
#     - 9 nodes adapted from note-finance v2.1 (12 nodes)
#     - Removed: Chunk (no PDF pipeline), Stance (no sell-side reports), Question (future)
#     - 16 relationships for 7 workflow outputs
#     - Namespace: kg_v1 (not kg_v2, to distinguish from note-finance)
#   v1.1 (2026-03-19): Quant knowledge extension
#     - Added: Method node (research methods, algorithms, frameworks)
#     - Added: Source.source_type += paper, code, documentation
#     - Added: Topic.category += quant_method, backtest, algorithm, risk_model
#     - Added: Author.author_type += academic
#     - Added: 3 new relationships (USES_METHOD, EXTENDS_METHOD, COMBINED_WITH)
#     - 10 nodes + 19 relationships for quant knowledge graph
#   v2.0 (2026-03-19): AI-driven quant strategy discovery extension
#     - Added: Anomaly node (market inefficiencies methods exploit)
#     - Added: PerformanceEvidence node (structured backtest/live results from Claims)
#     - Added: MarketRegime node (market environments affecting strategy effectiveness)
#     - Added: DataRequirement node (input data types methods need)
#     - Added: Topic.category += strategy_archetype, market_anomaly
#     - Added: Method.method_type expanded with 9 additional types from corpus
#     - Added: 8 new relationships (EXPLOITS, EVALUATES, QUANTIFIED_BY, EFFECTIVE_IN,
#              REQUIRES_DATA, EXPLAINED_BY, MEASURED_IN, COMPETES_WITH)
#     - 14 nodes + 27 relationships for AI strategy discovery graph
#     - Design goal: Enable AI to traverse "Anomaly → Method → PerformanceEvidence → MarketRegime"
#       chains for emergent strategy hypothesis generation
#   v2.1 (2026-03-19): Academic metadata extension
#     - Added: CITES relationship (Source → Source) for paper citation chains
#     - Added: COAUTHORED_WITH relationship (Author → Author) for co-authorship networks
#     - 14 nodes + 29 relationships
#     - Design goal: Enable co-author network analysis and citation chain traversal
#       for research lineage discovery
#   v2.2 (2026-03-19): Topic hierarchy & organization affiliation
#     - Added: Claim.confidence enum [high, medium, low]
#     - Added: Topic.is_meta boolean, Topic.category += meta
#     - Added: SUBTOPIC_OF relationship (Topic → Topic) for topic hierarchy
#     - Added: AFFILIATED_WITH relationship (Author → Entity) for organization links
#     - 14 nodes + 31 relationships

version: "2.2"

# ============================================================
# Node Definitions (14 nodes)
# ============================================================
nodes:
  Source:
    description: "Information source (news article, report, SEC Filing, original article)"
    properties:
      source_id:
        type: string
        unique: true
        required: true
        description: "Unique identifier (UUID5 from URL)"
      title:
        type: string
        required: true
        indexed: true
      url:
        type: string
        indexed: true
        description: "Source URL (null for local documents)"
      source_type:
        type: string
        required: true
        enum: [web, news, report, original, paper, code, documentation]
        indexed: true
        description: >
          web=website, news=news article, report=analyst/research report, original=self-authored,
          paper=academic paper/preprint, code=code repository/implementation, documentation=library/tool docs
      publisher:
        type: string
        indexed: true
        description: "Publisher or organization name"
      published_at:
        type: datetime
        indexed: true
      fetched_at:
        type: datetime
        required: true
      language:
        type: string
        default: "en"
      category:
        type: string
        indexed: true
        description: "Category tag (e.g., macro, stock, sector)"
      command_source:
        type: string
        indexed: true
        description: "Workflow command that generated this source"

  Entity:
    description: "Named entities referenced in facts and claims (companies, indices, sectors, countries, etc.)"
    properties:
      entity_id:
        type: string
        unique: true
        required: true
      name:
        type: string
        required: true
        indexed: true
      entity_type:
        type: string
        required: true
        enum: [company, index, sector, indicator, currency, commodity, person, organization, country, instrument]
        indexed: true
        description: >
          company=publicly traded company, index=stock index, sector=industry sector,
          indicator=economic indicator, currency=currency pair, commodity=commodity,
          person=individual, organization=non-market org, country=sovereign nation,
          instrument=financial instrument (bond, derivative, etc.)
      ticker:
        type: string
        indexed: true
        description: "Stock ticker symbol (if applicable)"
      aliases:
        type: string[]
        description: "Alternative names"
      isin:
        type: string
        indexed: true
        description: "ISIN code (if applicable)"

  Claim:
    description: >
      Subjective assertions, opinions, predictions, or judgments from sources.
      Includes recommendations, valuation assumptions, forecasts, sector views, and policy stances.
    properties:
      claim_id:
        type: string
        unique: true
        required: true
      content:
        type: string
        required: true
        description: "Claim statement"
      claim_type:
        type: string
        enum: [opinion, prediction, recommendation, analysis, assumption, guidance, risk_assessment, policy_stance, sector_view, forecast]
        indexed: true
        description: >
          opinion=viewpoint, prediction=future expectation, recommendation=buy/sell/hold,
          analysis=interpretation, assumption=valuation/model assumption,
          guidance=management guidance, risk_assessment=risk evaluation,
          policy_stance=monetary/fiscal policy view, sector_view=industry-level assessment,
          forecast=quantitative projection
      sentiment:
        type: string
        enum: [bullish, bearish, neutral, mixed]
        indexed: true
      magnitude:
        type: string
        enum: [strong, moderate, slight]
        description: "Strength of the sentiment or conviction"
      target_price:
        type: float
        description: "Target price (for recommendation claims)"
      rating:
        type: string
        description: "Rating label (e.g., Buy, Hold, Sell, Overweight)"
      time_horizon:
        type: string
        description: "Time horizon for the claim (e.g., '12M', 'FY26', 'long-term')"
      confidence:
        type: string
        enum: [high, medium, low]
        indexed: true
        description: "Confidence level: high=has quantitative evidence, medium=qualitative only, low=speculative"
      created_at:
        type: datetime
        required: true

  Fact:
    description: "Objectively verifiable past information extracted from sources. Strictly limited to verified, historical, objective data."
    properties:
      fact_id:
        type: string
        unique: true
        required: true
      content:
        type: string
        required: true
        description: "Fact statement"
      fact_type:
        type: string
        enum: [statistic, event, data_point, quote, policy_action, economic_indicator, regulatory, corporate_action]
        indexed: true
        description: >
          statistic=numerical data, event=occurrence, data_point=metric,
          quote=direct citation, policy_action=central bank/government action,
          economic_indicator=GDP/CPI/PMI etc, regulatory=regulatory change,
          corporate_action=M&A/dividend/buyback etc
      as_of_date:
        type: date
        indexed: true
        description: "Date the fact refers to"
      created_at:
        type: datetime
        required: true

  FinancialDataPoint:
    description: >
      Structured numerical data extracted from tables and text.
      Supports both actual (historical) and estimated (forecast) values via is_estimate flag.
    properties:
      datapoint_id:
        type: string
        unique: true
        required: true
        description: "SHA-256 based ID from source_hash:metric:period"
      metric_name:
        type: string
        required: true
        indexed: true
        description: "Metric name (e.g., 'Revenue', 'EBITDA', 'Net Income')"
      value:
        type: float
        required: true
        description: "Numeric value"
      unit:
        type: string
        required: true
        description: "Unit (e.g., 'USD mn', '%', 'x')"
      is_estimate:
        type: boolean
        required: true
        default: false
        indexed: true
        description: "true=analyst estimate/forecast, false=actual reported figure"
      currency:
        type: string
        description: "ISO 4217 currency code (e.g., 'USD', 'JPY')"
      created_at:
        type: datetime
        required: true

  FiscalPeriod:
    description: "Fiscal period for normalizing time references across reports"
    properties:
      period_id:
        type: string
        unique: true
        required: true
        description: "Format: {ticker}_{period_label} (e.g., 'AAPL_FY2025')"
      period_type:
        type: string
        required: true
        enum: [annual, quarterly, half_year, monthly]
        indexed: true
      period_label:
        type: string
        required: true
        indexed: true
        description: "Human-readable label (e.g., 'FY2025', '4Q25', '1H26')"
      start_date:
        type: date
        description: "Period start date"
      end_date:
        type: date
        description: "Period end date"

  Topic:
    description: "Topic or theme tag"
    properties:
      topic_id:
        type: string
        unique: true
        required: true
      name:
        type: string
        required: true
        indexed: true
      category:
        type: string
        enum: [macro, sector, stock, ai, finance, geopolitics, policy, valuation, earnings, quant_method, backtest, algorithm, risk_model, strategy_archetype, market_anomaly, meta]
        indexed: true
      is_meta:
        type: boolean
        default: false
        indexed: true
        description: "true=category-level meta-topic, false=leaf topic"

  Author:
    description: "Author or publishing organization"
    properties:
      author_id:
        type: string
        unique: true
        required: true
      name:
        type: string
        required: true
        indexed: true
      author_type:
        type: string
        required: true
        enum: [person, sell_side, buy_side, consultant, media, self, academic]
        indexed: true
        description: >
          person=individual, sell_side=investment bank, buy_side=asset manager,
          consultant=consulting firm, media=news outlet, self=own content,
          academic=university researcher/research group
      organization:
        type: string
        indexed: true

  Method:
    description: >
      Research method, algorithm, or framework used in academic papers and quant strategies.
      Enables cross-topic discovery by connecting papers that share techniques.
    properties:
      method_id:
        type: string
        unique: true
        required: true
        description: "Format: method-{slug} (e.g., 'method-gan-sdf')"
      name:
        type: string
        required: true
        indexed: true
        description: "Human-readable method name (e.g., 'GAN-SDF', 'Multi-Agent System')"
      method_type:
        type: string
        required: true
        enum: [architecture, algorithm, framework, technique, model, deep-learning, graph-construction, reasoning, stochastic-process, representation-learning, generative-model, causal-inference, optimization, protocol]
        indexed: true
        description: >
          architecture=neural network architecture (GAN, Transformer, GNN),
          algorithm=specific computational procedure (MCTS, LASSO),
          framework=end-to-end system design (MAS, PolyModel),
          technique=general approach (attention, RL, Bayesian),
          model=statistical/ML model (HMM, FinBERT, P-Trees),
          deep-learning=DL variant (GAT, Graph Conv LSTM),
          graph-construction=graph building method (LLM-based inference),
          reasoning=inference/reasoning method (rule-guided KG exploration),
          stochastic-process=probabilistic temporal model (Hawkes process),
          representation-learning=embedding/feature learning (contrastive learning),
          generative-model=generative sampling (GFlowNet, diffusion),
          causal-inference=causal discovery/analysis,
          optimization=search/optimization method (evolutionary),
          protocol=integration standard (MCP)
      description:
        type: string
        description: "Brief description of what the method does"
      created_at:
        type: datetime

  Insight:
    description: >
      AI-generated analytical output. Stores creative synthesis, contradiction detection,
      evidence gap analysis, hypotheses, and pattern recognition.
    properties:
      insight_id:
        type: string
        unique: true
        required: true
        description: "Format: ins-{YYYY-MM-DD}-{sequential}"
      insight_type:
        type: string
        required: true
        enum: [synthesis, contradiction, gap, hypothesis, pattern]
        indexed: true
        description: >
          synthesis=cross-source integration, contradiction=conflicting claims detected,
          gap=missing information identified, hypothesis=AI-generated testable prediction,
          pattern=recurring theme or trend
      content:
        type: string
        required: true
        description: "The insight text"
      model:
        type: string
        description: "AI model that generated this insight (e.g., 'claude-opus-4-6')"
      generated_at:
        type: datetime
        required: true
      status:
        type: string
        enum: [draft, validated, invalidated, archived]
        default: "draft"
        indexed: true
        description: "Lifecycle status of the insight"

  # --- v2.0 新規ノード ---

  Anomaly:
    description: >
      Market inefficiency or anomaly that investment methods exploit.
      Tracks what persistent mispricings exist and why, enabling AI to reason
      about which methods target which anomalies and assess decay risk.
    properties:
      anomaly_id:
        type: string
        unique: true
        required: true
        description: "Format: anomaly-{slug} (e.g., 'anomaly-momentum-effect')"
      name:
        type: string
        required: true
        indexed: true
        description: "Human-readable name (e.g., 'Momentum Effect', 'Alpha Decay')"
      anomaly_type:
        type: string
        required: true
        enum: [behavioral, structural, informational, microstructure, regulatory]
        indexed: true
        description: >
          behavioral=investor psychology (overreaction, anchoring, herding),
          structural=market structure (index inclusion, sector rotation),
          informational=information asymmetry (earnings surprise, insider flow),
          microstructure=trading mechanism (bid-ask bounce, order flow),
          regulatory=regulatory-driven (tax-loss selling, rebalancing)
      first_documented_year:
        type: integer
        description: "Year the anomaly was first documented in academic literature"
      persistence:
        type: string
        enum: [persistent, decaying, debated, regime_dependent]
        indexed: true
        description: "Current status of the anomaly's persistence"
      created_at:
        type: datetime
        required: true

  PerformanceEvidence:
    description: >
      Structured quantitative evidence extracted from Claims about method/strategy performance.
      Separates performance metrics from textual claims to enable quantitative comparison
      across methods, markets, and time periods.
    properties:
      evidence_id:
        type: string
        unique: true
        required: true
        description: "Format: perf-{method_slug}-{metric}-{hash8} (e.g., 'perf-gan-sdf-sharpe-a3b2c1d4')"
      metric_name:
        type: string
        required: true
        indexed: true
        description: "Performance metric (e.g., 'sharpe_ratio', 'annual_return', 'max_drawdown', 'accuracy', 'f1_score')"
      value:
        type: float
        required: true
        description: "Numeric value of the metric"
      unit:
        type: string
        description: "Unit (e.g., '%', 'ratio', 'bps')"
      benchmark:
        type: string
        description: "Benchmark used for comparison (e.g., 'S&P 500', 'linear model', 'buy-and-hold')"
      benchmark_value:
        type: float
        description: "Benchmark's value for the same metric"
      period_start:
        type: string
        description: "Evaluation period start (e.g., '2022-06')"
      period_end:
        type: string
        description: "Evaluation period end (e.g., '2023-12')"
      market:
        type: string
        indexed: true
        description: "Market/universe (e.g., 'US', 'China A-shares', 'CSI 500', 'NYSE', 'Eurostoxx 600')"
      is_oos:
        type: boolean
        indexed: true
        description: "true=out-of-sample, false=in-sample"
      sample_size:
        type: string
        description: "Sample description (e.g., '1000 stocks', '200 years', '29000 ratios')"
      created_at:
        type: datetime
        required: true

  MarketRegime:
    description: >
      Market environment classification affecting strategy effectiveness.
      Enables conditional reasoning: "Method X works in Regime Y but not Z."
    properties:
      regime_id:
        type: string
        unique: true
        required: true
        description: "Format: regime-{slug} (e.g., 'regime-high-volatility')"
      name:
        type: string
        required: true
        indexed: true
        description: "Human-readable name (e.g., 'High Volatility', 'QE Environment')"
      regime_type:
        type: string
        required: true
        enum: [volatility, monetary_policy, economic_cycle, sentiment, liquidity, correlation]
        indexed: true
        description: >
          volatility=vol regime (high/low/normal),
          monetary_policy=central bank stance (QE, QT, hiking, cutting),
          economic_cycle=macro phase (expansion, recession, recovery),
          sentiment=market mood (risk-on, risk-off, complacent),
          liquidity=market liquidity (tight, abundant),
          correlation=cross-asset correlation regime (high, low, decoupling)
      description:
        type: string
        description: "Detailed description of the regime characteristics"
      created_at:
        type: datetime
        required: true

  DataRequirement:
    description: >
      Input data type that a method requires for implementation.
      Enables feasibility assessment: "Given our available data, which methods can we use?"
    properties:
      data_req_id:
        type: string
        unique: true
        required: true
        description: "Format: datareq-{slug} (e.g., 'datareq-daily-price')"
      name:
        type: string
        required: true
        indexed: true
        description: "Human-readable name (e.g., 'Daily Price/Volume', 'Earnings Transcripts')"
      data_type:
        type: string
        required: true
        enum: [price, fundamental, alternative, text, graph, macro, options, corporate_action]
        indexed: true
        description: >
          price=market price/volume/OHLCV,
          fundamental=financial statements/ratios,
          alternative=alternative data (satellite, credit card, web traffic),
          text=unstructured text (news, transcripts, filings, social media),
          graph=relational/graph data (supply chain, ownership, competition),
          macro=macroeconomic indicators (GDP, CPI, rates, yield curve),
          options=options/derivatives data,
          corporate_action=M&A, dividends, splits, insider transactions
      frequency:
        type: string
        enum: [tick, minute, daily, weekly, monthly, quarterly, annual, event_driven]
        description: "Required data frequency"
      min_history:
        type: string
        description: "Minimum historical data needed (e.g., '5Y', '200 days', '10 quarters')"
      availability:
        type: string
        enum: [free, commercial, proprietary, mixed]
        indexed: true
        description: "Data availability: free=publicly available, commercial=paid vendors, proprietary=internal only"
      created_at:
        type: datetime
        required: true

# ============================================================
# Relationship Definitions (31 relationships)
# ============================================================
relationships:
  # Source -> Method
  USES_METHOD:
    from: Source
    to: Method
    description: "Source uses/applies this method"

  # Method -> Method (evolution chain)
  EXTENDS_METHOD:
    from: Method
    to: Method
    description: "This method extends or improves upon the target method"
    properties:
      improvement:
        type: string
        description: "What aspect was improved (e.g., 'adds interpretability', 'reduces computation')"

  COMBINED_WITH:
    from: Method
    to: Method
    description: "Two methods combined in a hybrid approach"
    properties:
      synergy:
        type: string
        description: "How the combination creates value"

  # Source -> Fact / Claim
  STATES_FACT:
    from: Source
    to: Fact
    description: "Source states an objective fact"
    properties:
      extracted_at:
        type: datetime
      page_or_section:
        type: string
        description: "Page number or section reference"

  MAKES_CLAIM:
    from: Source
    to: Claim
    description: "Source makes a subjective claim"
    properties:
      extracted_at:
        type: datetime
      page_or_section:
        type: string

  # Entity linking
  ABOUT:
    from: Claim
    to: Entity
    description: "Claim is about this entity"

  RELATES_TO:
    from: [Fact, FinancialDataPoint]
    to: Entity
    description: "Fact or data point references this entity"

  # Topic tagging
  TAGGED:
    from: [Source, Claim, Insight]
    to: Topic
    description: "Tagged with this topic"

  # Authorship
  AUTHORED_BY:
    from: Source
    to: Author
    description: "Source is authored by this person/organization"

  # Evidence chain
  SUPPORTED_BY:
    from: [Claim, Insight]
    to: [Fact, FinancialDataPoint, Claim]
    description: "Claim/Insight is supported by this evidence"
    properties:
      strength:
        type: string
        enum: [strong, moderate, weak, circumstantial]
        description: "How strongly this evidence supports the claim"
      reasoning:
        type: string
        description: "Explanation of why this evidence supports the claim"
      linked_at:
        type: datetime

  # Contradiction
  CONTRADICTS:
    from: Claim
    to: Claim
    description: "Two claims that contradict each other"
    properties:
      noted_at:
        type: datetime
      explanation:
        type: string
        description: "How/why the claims contradict"

  # Financial data relationships
  HAS_DATAPOINT:
    from: Source
    to: FinancialDataPoint
    description: "Source contains this financial data point"

  FOR_PERIOD:
    from: FinancialDataPoint
    to: FiscalPeriod
    description: "Data point is for this fiscal period"

  NEXT_PERIOD:
    from: FiscalPeriod
    to: FiscalPeriod
    description: "Temporal ordering between fiscal periods of the same ticker and period_type"
    properties:
      gap_months:
        type: integer
        description: "Number of months between the two periods"

  TREND:
    from: FinancialDataPoint
    to: FinancialDataPoint
    description: "Metric trend between consecutive periods for the same (entity, metric_name)"
    properties:
      change_pct:
        type: float
        description: "Percentage change from previous to current value"
      direction:
        type: string
        enum: [up, down, flat]
        description: "Trend direction: up if change_pct > 1, down if < -1, flat otherwise"

  # Insight relationships
  DERIVED_FROM:
    from: Insight
    to: [Fact, Claim, FinancialDataPoint, Insight]
    description: "Insight was derived from these inputs"
    properties:
      role:
        type: string
        description: "Role of the input (e.g., 'primary', 'supporting', 'contrasting')"

  VALIDATES:
    from: Insight
    to: [Claim, Insight]
    description: "This insight validates/confirms the target"
    properties:
      validated_at:
        type: datetime

  CHALLENGES:
    from: Insight
    to: [Claim, Insight]
    description: "This insight challenges/questions the target"
    properties:
      challenged_at:
        type: datetime
      reason:
        type: string

  # --- v2.0 新規リレーション ---

  # Method -> Anomaly
  EXPLOITS:
    from: Method
    to: Anomaly
    description: "This method exploits/targets this market anomaly"
    properties:
      mechanism:
        type: string
        description: "How the method exploits the anomaly (e.g., 'captures momentum via trend detection')"
      effectiveness:
        type: string
        enum: [proven, promising, theoretical, disputed]
        description: "Level of evidence for exploitation effectiveness"

  # PerformanceEvidence -> Method
  EVALUATES:
    from: PerformanceEvidence
    to: Method
    description: "This performance evidence evaluates this method"

  # Claim -> PerformanceEvidence
  QUANTIFIED_BY:
    from: Claim
    to: PerformanceEvidence
    description: "This claim's performance assertion is quantified by structured evidence"

  # Method -> MarketRegime
  EFFECTIVE_IN:
    from: Method
    to: MarketRegime
    description: "Evidence that this method is effective in this market regime"
    properties:
      evidence_summary:
        type: string
        description: "Summary of evidence for regime effectiveness"
      source_id:
        type: string
        description: "Source document providing this evidence"

  # Method -> DataRequirement
  REQUIRES_DATA:
    from: Method
    to: DataRequirement
    description: "This method requires this type of input data"
    properties:
      criticality:
        type: string
        enum: [essential, recommended, optional]
        description: "How critical this data is for the method"

  # Anomaly -> Claim
  EXPLAINED_BY:
    from: Anomaly
    to: Claim
    description: "Theoretical explanation of why this anomaly persists"
    properties:
      explanation_type:
        type: string
        enum: [persistence, decay, boundary_condition]
        description: "Type of explanation: why it persists, why it decays, or conditions for existence"

  # PerformanceEvidence -> MarketRegime
  MEASURED_IN:
    from: PerformanceEvidence
    to: MarketRegime
    description: "This performance was measured during this market regime"

  # Method -> Method (competitive alternatives)
  COMPETES_WITH:
    from: Method
    to: Method
    description: "Two methods that are alternatives for the same purpose"
    properties:
      dimension:
        type: string
        description: "Along what dimension they compete (e.g., 'stock prediction accuracy', 'alpha factor generation')"
      winner:
        type: string
        description: "Which method generally wins, if known (method_id or 'context_dependent')"

  # --- v2.1 Academic metadata ---

  # Source -> Source (citation chain)
  CITES:
    from: Source
    to: Source
    description: "This paper cites/references the target paper"
    properties:
      context:
        type: string
        description: "Citation context (e.g., 'baseline comparison', 'method extension', 'dataset')"

  # Author -> Author (co-authorship network)
  COAUTHORED_WITH:
    from: Author
    to: Author
    description: "Two authors who co-authored at least one paper"
    properties:
      paper_count:
        type: integer
        description: "Number of papers co-authored together"
      first_collaboration:
        type: string
        description: "Source ID of the first collaboration"

  # --- v2.2 Topic hierarchy & Affiliation ---

  # Topic -> Topic (hierarchy)
  SUBTOPIC_OF:
    from: Topic
    to: Topic
    description: "Child topic belongs to parent meta-topic (category-level grouping)"

  # Author -> Entity (affiliation)
  AFFILIATED_WITH:
    from: Author
    to: Entity
    description: "Author is affiliated with this organization (university, company, etc.)"

  # Causal chain
  CAUSES:
    from: [Fact, Claim, FinancialDataPoint]
    to: [Fact, Claim, FinancialDataPoint]
    description: "Causal relationship between knowledge nodes"
    properties:
      mechanism:
        type: string
        description: "How/why the cause leads to the effect"
      confidence:
        type: string
        enum: [high, medium, low]
        description: "Confidence level of the causal link"
      source_id:
        type: string
        description: "Source document that states this causal relationship"
      from_label:
        type: string
        enum: [Fact, Claim, FinancialDataPoint]
        description: "Label of the from-node (Neo4j CE workaround for multi-label MATCH)"
      to_label:
        type: string
        enum: [Fact, Claim, FinancialDataPoint]
        description: "Label of the to-node (Neo4j CE workaround for multi-label MATCH)"

